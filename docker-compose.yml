version: "3.9"

services:
  # ── FastAPI backend ──────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - WAZUH_BASE_URL=${WAZUH_BASE_URL}
      - WAZUH_USER=${WAZUH_USER}
      - WAZUH_PASS=${WAZUH_PASS}
      - OPENSEARCH_BASE_URL=${OPENSEARCH_BASE_URL}
      - OPENSEARCH_AUTH=${OPENSEARCH_AUTH}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.2}
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET}
      - MIN_ALERT_LEVEL=${MIN_ALERT_LEVEL:-7}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - CORS_ORIGINS=["http://localhost:3000","https://localhost"]
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - aria-internal
    # Expose only to internal network — Nginx proxies externally
    # (UFW blocks port 8000 from the outside — see deploy.sh)

  # ── React frontend ───────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - VITE_API_BASE=/api
      - VITE_WS_BASE=/ws
    networks:
      - aria-internal

  # ── Redis (alert pub/sub bus) ─────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - aria-internal
    volumes:
      - redis-data:/data

  # ── Nginx (TLS, reverse proxy) ────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/templates/default.conf.template:ro
      - /etc/nginx/ssl:/etc/nginx/ssl:ro
    environment:
      # BUG #4 FIX: OPENSEARCH_BASIC_AUTH is REQUIRED — no default value
      - OPENSEARCH_BASIC_AUTH=${OPENSEARCH_BASIC_AUTH}
    # nginx will substitute ${OPENSEARCH_BASIC_AUTH} in the template
    command: /bin/sh -c "envsubst '$$OPENSEARCH_BASIC_AUTH' < /etc/nginx/templates/default.conf.template > /etc/nginx/conf.d/default.conf && nginx -g 'daemon off;'"
    depends_on:
      - backend
      - frontend
    networks:
      - aria-internal
      - aria-external

networks:
  aria-internal:
    driver: bridge
    internal: true    # No direct external access — only through nginx
  aria-external:
    driver: bridge

volumes:
  redis-data:
