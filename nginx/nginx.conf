# ARIA SOC Platform — Nginx Reverse Proxy
# Handles TLS termination, API proxying, WebSocket upgrade,
# and OpenSearch credential injection (BUG #3/#4 fixes applied)

# ── Map to use $host variable for CSP (BUG #3 fix: never hardcode IPs) ────────
map $http_host $aria_csp {
    default "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; connect-src 'self' ws://$host wss://$host; img-src 'self' data:; font-src 'self' data: https://fonts.gstatic.com; frame-ancestors 'none';";
}

server {
    listen 443 ssl http2;
    server_name _;

    ssl_certificate     /etc/nginx/ssl/aria.crt;
    ssl_certificate_key /etc/nginx/ssl/aria.key;

    # TLS hardening
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header X-Frame-Options          DENY always;
    add_header X-Content-Type-Options   nosniff always;
    add_header X-XSS-Protection         "1; mode=block" always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    # BUG #3 FIX: use $host variable, never hardcode server IP
    add_header Content-Security-Policy  "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; connect-src 'self' ws://$host wss://$host; img-src 'self' data:; font-src 'self' data: https://fonts.gstatic.com https://fonts.googleapis.com; frame-ancestors 'none';" always;

    # ── Frontend (React SPA) ──────────────────────────────────────────────────
    location / {
        proxy_pass http://frontend:3000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── FastAPI backend ───────────────────────────────────────────────────────
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Forward the Authorization header from browser to FastAPI
        proxy_set_header Authorization     $http_authorization;
        proxy_pass_header Authorization;

        # SSE / streaming support (for /api/ai/chat)
        proxy_buffering     off;
        proxy_read_timeout  300s;
        proxy_send_timeout  300s;
    }

    # ── WebSocket (live alert stream) ─────────────────────────────────────────
    location /ws/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host       $host;
        proxy_read_timeout  3600s;  # 1 hour — keep WS alive
        proxy_send_timeout  3600s;
    }

    # ── OpenSearch (server-side credential injection) ─────────────────────────
    # BUG #4 FIX: credentials injected here — NEVER in browser
    location /opensearch/ {
        proxy_pass https://opensearch:9200/;
        proxy_ssl_verify off;  # Wazuh uses self-signed certs

        # Inject Basic auth header server-side — browser never sees this
        proxy_set_header Authorization "Basic ${OPENSEARCH_BASIC_AUTH}";
        proxy_set_header Host          opensearch:9200;

        # Strip browser-sent auth (only server-injected auth allowed)
        proxy_hide_header Authorization;
    }
}

# ── HTTP → HTTPS redirect ─────────────────────────────────────────────────────
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}
